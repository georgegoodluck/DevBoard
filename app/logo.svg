<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="400" height="100" fill="#000000" />

  <g transform="translate(20, 10)">
    <rect x="18" y="22" width="12" height="40" rx="3" fill="#FFFFFF" fill-opacity="0.1" />
    <rect x="38" y="22" width="12" height="40" rx="3" fill="#FFFFFF" fill-opacity="0.1" />
    <rect x="58" y="22" width="12" height="40" rx="3" fill="#FFFFFF" fill-opacity="0.1" />

    <g filter="url(#softGlow)">
      <path d="M34 28L24 42L34 56" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M54 28L64 42L54 56" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="40" y="38" width="8" height="8" rx="2" fill="url(#logoGrad)" />
    </g>
  </g>

  <text x="115" y="65" font-family="Inter, -apple-system, sans-serif" font-weight="900" font-size="52" letter-spacing="-0.04em" fill="#FFFFFF">Dev</text>
  <text x="212" y="65" font-family="Inter, -apple-system, sans-serif" font-weight="900" font-size="52" letter-spacing="-0.04em" fill="url(#logoGrad)">Board</text>
</svg>
